spring:
  application:
    name: tourisme-backend

  # --- Where your data lives (safe across backend restarts) ---
  # • PostgreSQL holds all destinations, activities, bookings, users, etc. Restarting Spring Boot does not wipe the DB.
  # • docker-compose.yml uses a named volume (tourisme_pgdata) so data survives container restarts.
  #   Avoid "docker compose down -v" unless you intend to delete the database volume.
  # • Uploaded images are files under app.upload.dir (default ./uploads relative to the process working directory).
  # • ddl-auto=update only evolves the schema; it does not drop tables or rows. Never use create-drop in production.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tourisme}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:5392}
    driver-class-name: org.postgresql.Driver

  # Runs before JPA. baseline-on-migrate: existing DBs without flyway_schema_history are baselined, then V2+ apply.
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 64MB
      max-request-size: 64MB

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-minimum-32-characters}
    expiration: 86400000 # 24 hours in milliseconds
  
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
  
  upload:
    dir: ${UPLOAD_DIR:uploads}

  # Canonical public site URL for sitemap.xml and robots.txt (no trailing slash). Override in production via SITE_PUBLIC_URL.
  seo:
    site-url: ${SITE_PUBLIC_URL:http://localhost:5173}
  
  # Same OAuth 2.0 Client ID as the frontend (VITE_GOOGLE_CLIENT_ID). Used to verify token audience.
  google:
    client-id: ${GOOGLE_CLIENT_ID:}

  # Outgoing email for admin replies to contact form (optional).
  # Set env: MAIL_HOST, MAIL_PORT (default 587), MAIL_USERNAME, MAIL_PASSWORD (Gmail: app password).
  # New contact form submissions are emailed to Settings → contact email, or this override if set:
  contact:
    mail-from-name: ${MAIL_FROM_NAME:Tour in Morocco}
    notification-to: ${CONTACT_INBOX_EMAIL:}

  # Startup seeding: insert-only / empty-DB paths by default — your PostgreSQL data is not reset on restart.
  seeding:
    # When false, DataSeeder does not run at all (strongest guarantee nothing touches the DB on startup).
    # Keep true for first install; set false after go-live if you want zero seeder runs.
    run-on-startup: ${SEED_RUN_ON_STARTUP:true}
    # When true, every backend start overwrites Sahara/Ouzoud reference copy and specific activity slugs/prices.
    # Default false: PostgreSQL is the source of truth; restart the app without wiping your edits.
    apply-tour-in-morocco-reference: ${APPLY_TOUR_IN_MOROCCO_REFERENCE:false}
    # When true, re-links activities that look like Sahara tours to the Sahara destination (can undo manual destination changes).
    # Default false so your destination assignments persist across restarts.
    relink-sahara-activities: ${RELINK_SAHARA_ACTIVITIES:false}
    # When true, sets every inactive activity back to active on each startup.
    # Default false so deactivating a tour in admin stays deactivated after restart.
    reactivate-all-activities: ${REACTIVATE_ALL_ACTIVITIES:false}
    # When false (default), destinations you delete in admin stay deleted after restart (no auto re-insert of Marrakech/Sahara or default Marrakech page cards).
    # When true, legacy behavior: missing default destinations/cards are recreated on each startup.
    recreate-missing-default-destinations: ${RECREATE_MISSING_DEFAULT_DESTINATIONS:false}
    # When true, insert-only seed for Ouzoud / Ourika / Marrakech Palm Grove if missing while the DB already has other destinations.
    # Default true so new catalog destinations appear after upgrades without extra env vars. Set SEED_CATALOG_DAY_TRIP_DESTINATIONS=false if you deleted a catalog destination and must not have it re-created on restart.
    seed-catalog-day-trip-destinations: ${SEED_CATALOG_DAY_TRIP_DESTINATIONS:true}
  
  # Used by GET /api/admin/backup/postgres-data — must point to pg_dump on the machine running Spring Boot.
  backup:
    pg-dump-path: ${PG_DUMP_PATH:pg_dump}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.tourisme: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
